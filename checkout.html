<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Coffee Time</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/style.css" />
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
      body { background-color: #faf3e0; padding-top: 30px; font-family: sans-serif; }
      .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      
      h2 { text-align: center; color: #8B4513; margin-bottom: 20px; }
      
      label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
      input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1rem; }
      
      button { background: #8B4513; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
      button:hover { background: #6b3310; }
      button:disabled { background: #ccc; cursor: not-allowed; }

      .summary-box { background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px dashed #ccc; margin-bottom: 20px; }
      .summary-box ul { padding-left: 20px; margin: 0; }
      .summary-box li { margin-bottom: 5px; color: #555; }
      .total-price { text-align: right; font-size: 1.2rem; color: #2e7d32; margin-top: 10px; font-weight: bold; }

      /* === STYLE MODAL QRIS === */
      .modal-overlay {
          display: none; /* Hidden by default */
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: rgba(0,0,0,0.7);
          justify-content: center; align-items: center;
          z-index: 1000;
      }
      .qris-box {
          background: white; padding: 30px; border-radius: 15px; text-align: center; width: 320px;
          animation: popUp 0.3s ease-out;
      }
      .qris-box img { width: 200px; height: 200px; margin: 15px 0; border: 1px solid #ddd; padding: 5px; border-radius: 5px; }
      .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #8B4513; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
      
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

  <div class="container">
    <h2>Checkout Konfirmasi</h2>
    
    <!-- Ringkasan Pesanan -->
    <div class="summary-box">
        <div id="order-list"></div>
        <div id="total-display" class="total-price"></div>
    </div>

    <form id="checkoutForm">
        <label>Nama Lengkap (Penerima)</label>
        <input type="text" id="fullname" placeholder="Contoh: Ranggis" required>
        
        <label>Metode Pembayaran</label>
        <select id="method" onchange="checkMethod()">
            <option value="Cash">Cash on Delivery (Bayar Ditempat)</option>
            <option value="QRIS">QRIS (Scan Barcode)</option>
        </select>

        <button type="submit" id="btnPay">Bayar Sekarang</button>
        <a href="index.html" style="display:block; text-align:center; margin-top:15px; color:#8B4513; text-decoration:none;">&larr; Kembali ke Menu</a>
    </form>
  </div>

  <!-- ================= MODAL QRIS ================= -->
  <div id="qrisModal" class="modal-overlay">
      <div class="qris-box">
          <h3 style="color:#8B4513; margin:0;">Scan QRIS</h3>
          <p style="font-size:0.9rem; color:#666;">Silakan scan kode di bawah ini</p>
          
          <!-- Dummy QR Code Generator -->
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=CoffeeTime-Payment-ID123" alt="QRIS Code">
          
          <div id="qris-status" style="font-weight:bold; color:#d84315;">
              <div class="spinner"></div> Menunggu pembayaran...
          </div>
          <p style="font-size:0.8rem; color:#888; margin-top:5px;">(Otomatis dalam 5 detik)</p>
      </div>
  </div>

  <script>
    // ============================================================
    // GANTI URL INI DENGAN ALAMAT CPANEL KAMU
    // ============================================================
    const BASE_URL = "http://localhost/coffee-time-website-main/api"; 

    // 1. Ambil Data Keranjang
    const cart = JSON.parse(localStorage.getItem('coffee_cart')) || [];
    
    if(cart.length === 0) {
        alert("Keranjang Kosong!"); window.location.href = "DashbordUser.html";
    }

    // Tampilkan Ringkasan
    let total = 0;
    let itemsForApi = [];
    const listDiv = document.getElementById('order-list');
    
    let html = '<ul>';
    cart.forEach(item => {
        let subtotal = item.price * item.quantity;
        total += subtotal;
        
        // Siapkan data array untuk API
        itemsForApi.push({
            name: item.name,
            price: item.price,
            qty: item.quantity
        });

        html += `<li><b>${item.name}</b> x ${item.quantity} = Rp ${subtotal.toLocaleString('id-ID')}</li>`;
    });
    html += '</ul>';
    
    listDiv.innerHTML = html;
    document.getElementById('total-display').innerText = "Total: Rp " + total.toLocaleString('id-ID');

    // 2. Event Listener Submit
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const method = document.getElementById('method').value;
        const btn = document.getElementById('btnPay');
        
        if (method === 'QRIS') {
            // Jika QRIS, Munculkan Modal Dulu
            showQrisModal();
        } else {
            // Jika Cash, Langsung Proses
            processPayment('Cash');
        }
    });

    // 3. Fungsi Tampilkan QRIS & Timer 5 Detik
    function showQrisModal() {
        const modal = document.getElementById('qrisModal');
        const statusText = document.getElementById('qris-status');
        
        // Tampilkan Modal
        modal.style.display = 'flex';
        
        // Hitung mundur 5 detik
        setTimeout(() => {
            statusText.innerHTML = `<span style="color:green;">✅ Pembayaran Berhasil!</span>`;
            
            // Tunggu 1 detik lagi biar user lihat centang hijau, baru simpan ke DB
            setTimeout(() => {
                processPayment('QRIS');
            }, 1000);
            
        }, 5000); // 5000 ms = 5 detik
    }

    // 4. Fungsi Kirim Data ke Backend (Database)
    function processPayment(paymentMethod) {
        const fullname = document.getElementById('fullname').value;
        const userId = localStorage.getItem('user_id');
        const btn = document.getElementById('btnPay');

        if(!userId) { alert("Sesi habis, login ulang."); window.location.href="login.html"; return; }

        btn.innerText = "Memproses..."; btn.disabled = true;

        fetch(`${BASE_URL}/save_order.php`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                customer_name: fullname,
                payment_method: paymentMethod, // Kirim metode pembayaran juga (opsional jika backend dukung)
                items: itemsForApi
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                // Bersihkan data
                localStorage.removeItem('coffee_cart'); 
                
                // Alert Sukses
                Swal.fire({
                    icon: 'success',
                    title: 'Pesanan Diterima!',
                    text: 'Terima kasih sudah memesan di Coffee Time.',
                    confirmButtonColor: '#8B4513'
                }).then(() => {
                    window.location.href = "index.html";
                });
            } else {
                Swal.fire('Gagal', data.message, 'error');
                btn.innerText = "Bayar Sekarang"; btn.disabled = false;
                document.getElementById('qrisModal').style.display = 'none'; // Tutup modal jika gagal
            }
        })
        .catch(err => {
            console.error(err);
            Swal.fire('Error', 'Gagal koneksi ke server', 'error');
            btn.innerText = "Bayar Sekarang"; btn.disabled = false;
            document.getElementById('qrisModal').style.display = 'none';
        });
    }
  </script>

</body>
</html>
